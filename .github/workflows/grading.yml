name: Autograding Tests
"on":
  push:
    branches: [main]
  #workflow_dispatch
  pull_request:
    branches: [main]
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    env:
      # For recording and parallelization to work you must set your CYPRESS_RECORD_KEY
      # in GitHub repo → Settings → Secrets → Actions
      E2E: true
      CI: true
      DATABASE_URL: ${{ secrets.DB_API_KEY}}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COURSE_ID: full-stack-development-comp3036-2026
      PASSWORD: ${{ secrets.ADMIN_PASS }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      # NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      # NEXTAUTH_URL: http://127.0.0.1:3001/
      # VERCEL_URL: http://127.0.0.1:3001/
      #TURBO_TOKEN: ${{secrets.TURBO_TOKEN}}
      #TURBO_TEAM: team_FXFYQlL6HSM7CAamFdBZ5A6x
      SKIP_ENV_VALIDATION: true
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install PNPM 📦
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies 🧪
        run: pnpm install
      - name: Install Playwright Browsers
        working-directory: tests/playwright
        run: pnpm playwright install chromium --with-deps
      - name: Push Database 📦
        run: pnpm --filter @repo/db db:push
      - name: Build the project 🏗
        run: pnpm turbo build

      ####################
      # UTILS TESTS
      ####################

      # - name: Test - Utils
      #   id: testUtils
      #   uses: WesternSydneyUniversity/autograding-command-grader@v2
      #   continue-on-error: true
      #   with:
      #     working-directory: packages/utils
      #     test-name: Unit 1 - Utils
      #     command: pnpm test
      #     timeout: 10
      #     max-score: 1

      # - name: Test - Ui
      #   id: testUi
      #   uses: WesternSydneyUniversity/autograding-command-grader@v2
      #   continue-on-error: true
      #   with:
      #     working-directory: packages/ui
      #     test-name: Unit 2 - UI
      #     command: pnpm test
      #     timeout: 10
      #     max-score: 1

      # - name: Test - Web
      #   id: testWeb
      #   uses: WesternSydneyUniversity/autograding-command-grader@v2
      #   continue-on-error: true
      #   with:
      #     working-directory: apps/web
      #     test-name: Unit 3 - Web Components
      #     command: pnpm test
      #     timeout: 10
      #     max-score: 1

      ####################
      # ASSIGNMENT 2.1
      ####################
      - name: Test Front end with Playwright
        id: npm1
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Part 1 - Front end
          command: pnpm turbo test-1
          timeout: 10
          max-score: 1
      

      ####################
      # ASSIGNMENT 2.2
      ####################
      - name: Test Back end with Playwright
        id: npm2
        uses: WesternSydneyUniversity/autograding-command-grader@v2
        continue-on-error: true
        with:
          working-directory: .
          test-name: Part 2 - Backend
          command: pnpm turbo test-2
          timeout: 10
          max-score: 1

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          NPM1_RESULTS: "${{steps.npm1.outputs.result}}"
          NPM2_RESULTS: "${{steps.npm2.outputs.result}}"
          # NPM3_RESULTS: "${{steps.npm3.outputs.result}}"
          # TESTUTILS_RESULTS: "${{steps.testUtils.outputs.result}}"
          # TESTUI_RESULTS: "${{steps.testUi.outputs.result}}"
          # TESTWEB_RESULTS: "${{steps.testWeb.outputs.result}}"
        with:
          runners: npm1,npm2
          # runners: npm1,npm2,npm3,testUtils,testUi,testWeb
